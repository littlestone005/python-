{% extends "base.html" %}
{% block title %}注册 - Flask身份认证系统{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">用户注册</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="confirm" class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="confirm" name="confirm" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-success w-100">注册</button>
                </form>

                <div class="mt-3 text-center">
                    <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
