{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h1 class="text-center">Flask身份认证系统演示</h1>
        <p class="lead text-center">这是一个简单的用户身份认证和权限管理系统</p>
        
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">系统功能</h5>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">用户登录/登出</li>
                    <li class="list-group-item">管理员与普通用户身份区分</li>
                    <li class="list-group-item">基于角色的权限控制</li>
                    <li class="list-group-item">不同角色访问不同资源</li>
                </ul>
                
                <div class="mt-3">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">进入仪表板</a>
                    {% else %}
                        <a href="{{ url_for('login') }}" class="btn btn-success">登录系统</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
